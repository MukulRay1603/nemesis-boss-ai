default_settings: null
behaviors:
  BossAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
      use_recurrent: false
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 300000
    time_horizon: 128
    summary_freq: 5000

environment_parameters:
  player_speed:
    curriculum:
      - name: SlowPlayer
        completion_criteria:
          measure: reward
          behavior: BossAgent
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 12.0
        value: 1.0
      - name: NormalPlayer
        completion_criteria:
          measure: reward
          behavior: BossAgent
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 14.0
        value: 2.0
      - name: FastPlayer
        value: 3.0